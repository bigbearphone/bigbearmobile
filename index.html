<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ผ่อนมือถือ อุดรธานี ดาวน์ 0 บาท | หมีใหญ่ โมบาย</title>
<meta name="description" content="ผ่อนมือถือ อุดรธานี อนุมัติง่าย ใช้บัตรประชาชนใบเดียว ดาวน์ 0 บาท ไม่ต้องค้ำ รู้ผลไวใน 5 นาที">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Prompt',sans-serif;}

body{
background:linear-gradient(180deg,#fff,#f5f5f7);
color:#1d1d1f;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.hero{
text-align:center;
margin-bottom:25px;
}

.hero h1{
font-size:26px;
font-weight:600;
}

.hero p{
color:#666;
margin-top:8px;
}

.badge{
color:red;
margin-top:10px;
font-size:14px;
}

.card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.field{margin-bottom:16px;}

label{
font-size:13px;
color:#888;
margin-bottom:5px;
display:block;
}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#000;
color:#fff;
font-size:16px;
cursor:pointer;
}

.loading,.success{
display:none;
text-align:center;
margin-top:15px;
}

.success{color:green;}

.floating{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.floating a{
padding:14px;
border-radius:50px;
color:#fff;
text-decoration:none;
font-size:14px;
text-align:center;
}

.line-btn{background:#06C755;}
.call-btn{background:#000;}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🔥 ผ่อนมือถือ อุดรธานี</h1>
<p>ดาวน์ 0 บาท | รู้ผลไวใน 5 นาที</p>
<p>✔ ใช้บัตรประชาชนใบเดียว</p>
<p>✔ ไม่ต้องค้ำ ✔ ติดเครดิตสมัครได้</p>
<p class="badge">❗ จำกัด 10 สิทธิ์/วัน</p>
</div>

<div class="card">
<form id="form">

<div class="field">
<label>บริการ</label>
<select name="service" required>
<option value="">เลือกบริการ</option>
<option>เข้ารับบริการหน้าร้าน</option>
<option>รับบริการนอกสถานที่</option>
</select>
</div>

<div class="field">
<label>เวลา</label>
<select name="time" id="time" required></select>
</div>

<div class="field">
<label>ชื่อเล่น</label>
<input type="text" name="name" required>
</div>

<div class="field">
<label>เบอร์ติดต่อ</label>
<input type="tel" name="phone" pattern="0[0-9]{9}" maxlength="10" required>
</div>

<div class="field">
<label>รายได้</label>
<select name="income" required>
<option value="">เลือก</option>
<option>5000-15000</option>
<option>15000-25000</option>
<option>25000+++</option>
</select>
</div>

<div class="field">
<label>ยี่ห้อ</label>
<select name="brand" required>
<option value="">เลือก</option>
<option>Apple</option>
<option>Samsung</option>
<option>OPPO</option>
<option>VIVO</option>
<option>Xiaomi</option>
<option>iQoo</option>
<option>Infinix</option>
</select>
</div>

<button class="btn">ลงทะเบียน</button>

<div class="loading" id="loading">⏳ กำลังส่งข้อมูล...</div>
<div class="success" id="success">✅ ส่งสำเร็จ กำลังพาไป LINE...</div>

</form>
</div>

</div>

<div class="floating">
<a href="https://line.me/ti/p/@024kwxvw" class="line-btn">LINE</a>
<a href="tel:0648386496" class="call-btn">โทร</a>
</div>

<script>
// generate time
let time = document.getElementById("time");
for(let i=10;i<=20;i++){
let t = i.toString().padStart(2,'0')+":00";
let opt = document.createElement("option");
opt.value = t;
opt.innerHTML = t;
time.appendChild(opt);
}

// submit
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

const btn = document.querySelector(".btn");
const loading = document.getElementById("loading");
const success = document.getElementById("success");

let formData = new FormData(this);
let obj = {};
formData.forEach((v,k)=>obj[k]=v);

btn.disabled = true;
loading.style.display="block";

try{
const res = await fetch("https://script.google.com/macros/s/AKfycbycHnDqKDFE1FpEs_PIKIBQsm-Q80RFfhu41H39JaFNxZj1wWPgNyTqe_jVh8Tc8fYtug/exec",{
method:"POST",
body:JSON.stringify(obj),
headers:{ "Content-Type":"application/json" }
});

const text = await res.text();

if(text.includes("success")){
loading.style.display="none";
success.style.display="block";

setTimeout(()=>{
window.location.href="https://line.me/ti/p/@024kwxvw";
},1500);

}else{
throw "error";
}

}catch(err){
loading.innerHTML="❌ ส่งไม่สำเร็จ ลองใหม่";
btn.disabled=false;
}

});
</script>

</body>
</html>
