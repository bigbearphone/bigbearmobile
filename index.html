<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หมีใหญ่ โมบาย อุดรธานี | Mee Yai Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --dark-bg: #0f0f0f;
    --accent-purple: #8e24aa;
    --text-main: #ffffff;
    --glass: rgba(255,255,255,0.05);
    --line-color: #06C755;
    --fb-color: #1877F2;
}

html { scroll-behavior: smooth; }

body {
    margin:0;
    background:var(--dark-bg);
    color:var(--text-main);
    font-family:'Kanit',sans-serif;
}

.container { max-width:1200px; margin:auto; padding:0 20px; }
section { padding:100px 20px; text-align:center; }
h2 { font-size:2.2rem; margin-bottom:40px; }

/* NAV */
.sticky-nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(15,15,15,0.85);
    backdrop-filter:blur(15px);
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    z-index:1000;
}
.nav-btn {
    background:var(--accent-purple);
    padding:8px 20px;
    border-radius:50px;
    color:#fff;
    text-decoration:none;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle,#2e1a47,#0f0f0f);
}
.hero h1 {
    font-size:4rem;
    background:linear-gradient(to right,#fff,#ab47bc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.hero-btn {
    margin-top:30px;
    display:inline-block;
    padding:14px 40px;
    border:2px solid var(--accent-purple);
    border-radius:50px;
    color:#fff;
    text-decoration:none;
}

/* =========================
   ULTRA PREMIUM BRAND GRID
========================= */
.brand-section {
    position:relative;
    background:radial-gradient(circle,#1a1a1a,#0f0f0f);
    overflow:hidden;
}

.brand-section::before {
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,rgba(142,36,170,0.3),transparent);
    filter:blur(100px);
    top:-150px;
    left:-150px;
}

.brand-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:60px;
    justify-items:center;
}

.brand-item {
    width:100%;
    max-width:150px;
    aspect-ratio:3/1;
    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);

    opacity:0;
    transform:translateY(40px) scale(0.9);

    transition:all .6s cubic-bezier(.22,1,.36,1);
}

.brand-item.show {
    opacity:1;
    transform:translateY(0) scale(1);
}

.brand-item:hover {
    transform:scale(1.15);
    box-shadow:0 20px 40px rgba(0,0,0,0.5),
               0 0 40px rgba(142,36,170,0.4);
}

.brand-item svg {
    width:100%;
    height:auto;
    max-height:40px;
    fill:#888;
    transition:.4s;
}

.brand-item:hover svg {
    fill:#fff;
}

/* Light Sweep */
.brand-item::after {
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
}
.brand-item:hover::after {
    left:120%;
    transition:.8s;
}

/* SERVICE */
.service-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}
.service-card {
    padding:40px;
    border-radius:20px;
    background:var(--glass);
}
.service-card:hover {
    transform:translateY(-8px);
}

/* CTA */
.register-section {
    background:linear-gradient(to top,#2e1a47,#0f0f0f);
}
.btn-link {
    display:inline-block;
    padding:18px 30px;
    background:var(--accent-purple);
    border-radius:50px;
    color:#fff;
    text-decoration:none;
}

/* FLOATING */
.floating-social {
    position:fixed;
    right:20px;
    bottom:30px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.social-btn {
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}
.btn-line { background:#06C755; }
.btn-fb { background:#1877F2; }

@media(max-width:768px){
    .hero h1 { font-size:2.5rem; }
}
</style>
</head>

<body>

<nav class="sticky-nav">
    <div>หมีใหญ่ โมบาย</div>
    <a href="#register-section" class="nav-btn">เช็คสิทธิ์</a>
</nav>

<div class="floating-social">
    <a href="https://line.me/ti/p/@024kwxvw" class="social-btn btn-line">L</a>
    <a href="https://facebook.com" class="social-btn btn-fb">f</a>
</div>

<section class="hero">
    <div>
        <h1>หมีใหญ่ โมบาย</h1>
        <p>ผ่อนมือถือ อนุมัติไว</p>
        <a href="#register-section" class="hero-btn">เช็คสิทธิ์</a>
    </div>
</section>

<!-- BRAND -->
<section class="brand-section">
<div class="container">
<h2>แบรนด์ชั้นนำ</h2>

<div class="brand-grid">

<div class="brand-item">
<svg viewBox="0 0 14 44" preserveAspectRatio="xMidYMid meet">
<path d="m13.07 17.68..."></path>
</svg>
</div>

<div class="brand-item">
<svg viewBox="0 0 130 29" preserveAspectRatio="xMidYMid meet">
<path d="M0 13.8..."></path>
</svg>
</div>

<div class="brand-item">
<svg viewBox="0 0 103 28" preserveAspectRatio="xMidYMid meet">
<path d="M92 22..."></path>
</svg>
</div>

</div>
</div>
</section>

<!-- SERVICE -->
<section>
<div class="container">
<h2>ทำไมต้องเรา</h2>

<div class="service-grid">
<div class="service-card">
<h3>อนุมัติไว</h3>
<p>รู้ผลภายใน 4 นาที</p>
</div>

<div class="service-card">
<h3>ไม่ต้องค้ำ</h3>
<p>ใช้บัตรประชาชนใบเดียว</p>
</div>

<div class="service-card">
<h3>เครื่องแท้</h3>
<p>ศูนย์ไทย 100%</p>
</div>
</div>

</div>
</section>

<!-- CTA -->
<section id="register-section" class="register-section">
<h2>ลงทะเบียนเช็คสิทธิ์</h2>
<a href="https://script.google.com/macros/s/AKfycbx9Wiw66Lu6wDhxGUSisg4fJNlgAZr8HQeXP5k1B16d_apgtSUs2icxGaD7L_4KzL_6wg/exec" class="btn-link">
เช็คสิทธิ์ตอนนี้
</a>
</section>

<footer style="padding:30px;opacity:.5;">
© 2026 BigBear Mobile
</footer>

<script>
const items = document.querySelectorAll('.brand-item');

const observer = new IntersectionObserver(entries=>{
entries.forEach((entry,i)=>{
if(entry.isIntersecting){
setTimeout(()=>entry.target.classList.add('show'),i*120);
}
});
},{threshold:0.2});

items.forEach(el=>observer.observe(el));
</script>

</body>
</html>
