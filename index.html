<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผ่อนมือถือ อุดรธานี ดาวน์ 0 บาท</title>

<meta name="description" content="ผ่อนมือถือ ใช้บัตรประชาชนใบเดียว อนุมัติไว 30 นาที รู้ผล">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#f5f5f7;
}

/* HERO */
.hero{
  padding:60px 20px;
  text-align:center;
}
.hero h1{
  font-size:28px;
  font-weight:700;
}
.hero p{
  color:#666;
}

/* CARD */
.card{
  background:#fff;
  margin:20px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* FORM */
input,select{
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:#0071e3;
  color:#fff;
  font-size:16px;
}

/* FLOAT BTN */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#06c755;
  color:#fff;
  padding:16px;
  border-radius:50px;
  font-size:14px;
}

/* LOADING */
#loading{
  display:none;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>ผ่อนมือถือ อนุมัติไว 30 นาที</h1>
  <p>ใช้บัตรประชาชนใบเดียว | ดาวน์ 0 บาท</p>
</div>

<!-- FORM -->
<div class="card">
<form id="form">

<select name="service" required>
<option value="">เลือกบริการ</option>
<option>เข้ารับบริการหน้าร้าน</option>
<option>รับบริการนอกสถานที่</option>
</select>

<select name="time" id="time"></select>

<input type="text" name="name" placeholder="ชื่อเล่น" required>

<input type="tel" name="phone" placeholder="เบอร์โทร 10 หลัก" pattern="0[0-9]{9}" required>

<select name="income">
<option>5000-15000</option>
<option>15000-25000</option>
<option>25000+++</option>
</select>

<select name="brand">
<option>Apple</option>
<option>Samsung</option>
<option>OPPO</option>
<option>VIVO</option>
<option>Xiaomi</option>
<option>iQoo</option>
<option>Infinix</option>
</select>

<button type="submit">ลงทะเบียนตอนนี้</button>

</form>

<div id="loading">⏳ กำลังส่งข้อมูล...</div>
</div>

<!-- FLOAT LINE -->
<a class="float" href="https://line.me/R/ti/p/@024kwxvw">
  แอด LINE
</a>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxMnJm4n-EgC32BR1yUdG0tBN5LFBLPK6LztPFY1F-taGBA3MazjqCCnqEE7wcR0d8i/exec";

// สร้างเวลา 10:00 - 20:00
const time = document.getElementById("time");
for(let i=10;i<=20;i++){
  let t = (i<10?"0":"")+i+":00";
  let opt = document.createElement("option");
  opt.value = t;
  opt.text = "เวลา " + t;
  time.appendChild(opt);
}

// submit
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = Object.fromEntries(new FormData(this).entries());

  document.getElementById("loading").style.display="block";

  try{
    const res = await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify(data)
    });

    const result = await res.json();

    if(result.status==="success"){
      alert("✅ ส่งสำเร็จ แอด LINE ได้เลย");

      // 🔥 เปิด LINE ก่อน
      window.open("https://line.me/R/ti/p/@024kwxvw");

    }else{
      alert("❌ เกิดข้อผิดพลาด");
    }

  }catch(err){
    alert("❌ ส่งไม่สำเร็จ");
  }

  document.getElementById("loading").style.display="none";
});
</script>

</body>
</html>
